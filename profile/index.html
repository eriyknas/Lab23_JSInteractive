<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Профиль пользователя</h1>
        <div class="form-box">
            <h2>Введите данные</h2>
            
            <input type="text" id="name" placeholder="Имя">
            <div class="error" id="nameError"></div>
            
            <input type="number" id="age" placeholder="Возраст">
            <div class="error" id="ageError"></div>
            
            <input type="text" id="city" placeholder="Город">
            <div class="error" id="cityError"></div>
            
            <input type="text" id="hobby" placeholder="Хобби">
            <div class="error" id="hobbyError"></div>
            
            <button id="saveBtn">Сохранить</button>
            <button id="clearBtn">Очистить</button>
        </div>
        <div class="info-box" id="infoBox" style="display: none;">
            <h2>Информация о пользователе</h2>
            <p><strong>Имя:</strong> <span id="displayName"></span></p>
            <p><strong>Возраст:</strong> <span id="displayAge"></span></p>
            <p><strong>Город:</strong> <span id="displayCity"></span></p>
            <p><strong>Хобби:</strong> <span id="displayHobby"></span></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
